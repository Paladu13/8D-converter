services:
  - type: web
    name: audio-8d-studio
    runtime: python
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

# ═══════════════════════════════════════════════════════════════
# IMPORTANT : Cookies YouTube pour Render (datacenter)
# ═══════════════════════════════════════════════════════════════
# YouTube bloque les IPs de datacenter (Render, Heroku, etc.)
# Solution : exporter ses cookies YouTube et les passer en variable.
#
# 1. Installer l'extension "Get cookies.txt" (Netscape format) sur Chrome/Firefox
# 2. Aller sur youtube.com, cliquer sur l'icône de l'extension → Export
# 3. Convertir en base64 :
#    macOS/Linux : cat cookies.txt | base64 | pbcopy
#    Windows PowerShell : [Convert]::ToBase64String([IO.File]::ReadAllBytes("cookies.txt")) | Set-Clipboard
# 4. Coller le résultat ci-dessous :
#
# - key: YOUTUBE_COOKIES
#   value: ""
#
# Conseil : les cookies expirent, il faudra les renouveler tous les mois environ.
