services:
  - type: web
    name: audio-8d-studio
    runtime: python
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Optionnel : cookies YouTube en base64 (cookies.txt format Netscape)
      # Générez avec : cat cookies.txt | base64 | pbcopy
      # - key: YOUTUBE_COOKIES
      #   value: "<votre-base64-ici>"
      # Alternative : uploader le fichier cookies.txt via l'interface web
