<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="page">
  <header>
    <div class="logo-ring">
      <div class="ring ring-outer"></div>
      <div class="ring ring-inner"></div>
      <div class="ring-dot"></div>
    </div>
    <h1>Spotify <span>Download</span></h1>
    <p class="subtitle">Télécharge tes musiques Spotify en MP3</p>
  </header>

  <div class="main-content">
    <div class="card">
      <div class="spotify-input-area">
        <label>
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;vertical-align:middle;margin-right:4px;"><path d="M19 4H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><circle cx="12" cy="13" r="3"/><path d="M12 10v2l1 1"/></svg>
          Lien Spotify
        </label>
        <input class="spotify-url-input" id="spotifyUrl" type="text" placeholder="https://open.spotify.com/track/..." autocomplete="url" spellcheck="false" />
        <div class="spotify-hint">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          Colle le lien d'une musique Spotify (track). Le nom et l'artiste seront conservés.
        </div>
      </div>

      <!-- Résultat info (titre + artiste) -->
      <div class="spotify-result" id="spotifyResult">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span class="sr-name" id="spotifyResultName">Musique téléchargée</span>
        <span class="sr-artist" id="spotifyResultArtist">Artiste inconnu</span>
      </div>

      <!-- Bouton téléchargement Spotify -->
      <button class="btn-primary btn-spotify" id="spotifyBtn" disabled>
        <svg viewBox="0 0 24 24" style="stroke:#fff;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Télécharger depuis Spotify
      </button>

      <!-- Progression Spotify -->
      <div class="progress-section" id="spotifyProgressSection">
        <div class="progress-header">
          <span class="progress-label" id="spotifyProgressLabel">Téléchargement…</span>
          <span class="progress-pct" id="spotifyProgressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill green" id="spotifyProgressFill"></div>
        </div>
        <div class="progress-sub" id="spotifyProgressSub"></div>
      </div>

      <!-- Message statut Spotify -->
      <div class="status-msg" id="spotifyStatusMsg">
        <svg id="spotifyStatusIcon" viewBox="0 0 24 24"></svg>
        <span id="spotifyStatusText"></span>
      </div>

      <!-- Bouton téléchargement fichier Spotify -->
      <a class="btn-download" id="spotifyDownloadBtn" href="#">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Télécharger le fichier MP3
      </a>
    </div>
  </div>

  <footer>
    Écoute ta musique partout 🎧
  </footer>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
